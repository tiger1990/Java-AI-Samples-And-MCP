spring:
  application:
    name: aisamples

  main:
    web-application-type: servlet
    banner-mode: off

  ai:
    chat:
      client:
        enabled: false

    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 10000

    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6

    mcp:
      server:
        #studio: true
        enabled: true
        protocol: STREAMABLE
        name: spring-io-test-mcp
        version: 0.0.1
        type: SYNC
        instruction: "This server provides session catalogue data for Spring I/O 2025"
        request-timeout: 30s
        capabilities:
          resource: false
          tool: true
          prompt: false
          completion: false
server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: "*"

#  main:
#    web-application-type: none
#    banner-mode: off

logging:
  level:
    org.springframework.ai.mcp: DEBUG
    io.modelcontextmodelprotocol: DEBUG
    root: INFO